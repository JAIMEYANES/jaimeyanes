baseURL = "https://jaimeyanes.github.io/"
languageCode = "es-ES"
title = "Jaime Yanes | Seguridad y Comunicaciones"
theme = "PaperMod"

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[minify]
  disableXML = true
  minifyOutput = true

# ─────────────────────────────────────────────
#  PARÁMETROS GLOBALES Y ESTILO
# ─────────────────────────────────────────────
[params]
  env             = "production"
  author          = "Jaime Yanes"
  description     = "Arquitecto de redes y seguridad | Fortinet, Cisco, Palo Alto"
  keywords        = ["Seguridad de Red", "SD-WAN", "Fortinet", "Zero Trust", "SASE"]
  
  defaultTheme    = "dark"
  disableThemeToggle = true 

  # --- Ajustes de color para que no sea soso ---
  # Estos nombres de variables son los que PaperMod reconoce directamente
  bg = "#111827"
  fg = "#d1d5db"
  accent = "#3b82f6"

  # Página de inicio
  [params.homeInfoParams]
    Title   = "Jaime Yanes"
    Content = "Arquitecto de redes y seguridad con años desplegando infraestructuras críticas. Escribo sobre lo que sé porque lo he operado: firewalls, SD-WAN, Zero Trust, SASE y la convergencia entre redes y seguridad."

  # Iconos sociales
  [[params.socialIcons]]
    name = "linkedin"
    url  = "https://linkedin.com/in/jaimeyg"
  [[params.socialIcons]]
    name = "github"
    url  = "https://github.com/jaime-yanes"

  # Comportamiento de los posts
  ShowReadingTime       = true
  ShowShareButtons      = false
  ShowPostNavLinks      = true
  ShowBreadCrumbs       = true
  ShowCodeCopyButtons   = true
  UseHugoToc            = true

  [params.label]
    text = "Jaime Yanes"

# ─────────────────────────────────────────────
#  MENÚ DE NAVEGACIÓN
# ─────────────────────────────────────────────
[[menu.main]]
  identifier = "blog"
  name       = "Blog"
  url        = "/posts/"
  weight     = 10

[[menu.main]]
  identifier = "portfolio"
  name       = "Porfolio"
  url        = "/portfolio/"
  weight     = 20

[[menu.main]]
  identifier = "sobre-mi"
  name       = "Sobre mí"
  url        = "/sobre-mi/"
  weight     = 30

[[menu.main]]
  identifier = "contacto"
  name       = "Conectar"
  url        = "/contacto/"
  weight     = 40

# ─────────────────────────────────────────────
#  CONFIGURACIÓN TÉCNICA
# ─────────────────────────────────────────────
[taxonomies]
  category = "categories"
  tag      = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
